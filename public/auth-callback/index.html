<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening Frigate Mobile</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #e2e8f0;
      padding: 24px;
      text-align: center;
    }
    main {
      max-width: 420px;
    }
    a {
      color: #7dd3fc;
    }
  </style>
</head>
<body>
  <main>
    <h1>Opening Frigate Mobile</h1>
    <p>If the app does not open automatically, use the button below.</p>
    <p><a id="open-link" href="#">Open Frigate Mobile</a></p>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');

    let target = 'frigate-mobile://auth-callback';
    if (error) {
      target += '?error=' + encodeURIComponent(error);
    } else if (code && state) {
      target += '?code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(state);
    }

    document.getElementById('open-link').href = target;
    window.location.replace(target);
  </script>
</body>
</html>
